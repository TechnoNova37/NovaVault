<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RewardVault - Secure Verification</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .action-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .action-btn:hover {
            background-color: var(--accent-hover);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .modal-content h3 {
            margin-bottom: 12px;
            font-size: 1.25rem;
        }

        .modal-content p {
            margin-bottom: 24px;
            font-size: 0.9rem;
            min-height: 40px;
        }

        /* Modern Spinner */
        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #334155;
            border-top-color: var(--accent);
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>RewardVault</h2>
        <p>Secure Rewards Verification Portal</p>
        <button class="action-btn" id="actionBtn" onclick="startVerification()">Proceed to Offer</button>
    </div>

    <div id="loadingModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Security Check</h3>
            <p id="modalStatus">Initializing secure session...</p>
            <div class="loader"></div>
        </div>
    </div>

    <script>
        function startVerification() {
            // Show the loading modal
            document.getElementById('loadingModal').style.display = 'flex';
            
            // Step 1: Initializing
            setTimeout(() => {
                document.getElementById('modalStatus').style.color = "#94a3b8";
                document.getElementById('modalStatus').innerText = "Verifying device parameters...";
                
                // Step 2: Verifying
                setTimeout(() => {
                    document.getElementById('modalStatus').style.color = "#22c55e";
                    document.getElementById('modalStatus').innerText = "Connection established securely. Redirecting...";
                    
                    // Step 3: Redirection
                    setTimeout(() => {
                        /* PASTE YOUR NEW LINK BELOW:
                           Replace the URL inside the quotes with your live OGAds SmartLink or Content Locker URL.
                        */
                        window.location.href = "YOUR_OGADS_OR_CPA_LINK_HERE"; 
                    }, 1200);
                    
                }, 1800);
                
            }, 1500);
        }
    </script>
</body>
</html>
